<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guildou Awards — Créateur de questions</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="theme-void">
    <div id="bg"></div>
    <header class="site-header">
      <div class="container header-row">
        <div class="brand">
          <div class="logo"><img src="img/logo-contre-soiree.png" alt="Logo Guilde" /></div>
          <div>
            <h1>Guildou Awards</h1>
          </div>
        </div>
        <nav class="top-actions">
          <div class="mode-toggle" role="tablist" aria-label="Mode">
            <button id="modeAdmin" class="btn ghost active" role="tab" aria-selected="true">Admin</button>
            <button id="modePublic" class="btn ghost" role="tab">Public</button>
          </div>
          <button id="logoutBtn" class="btn ghost admin-only" style="display:none">Déconnexion</button>
          <button id="exportResponses" class="btn ghost admin-only">Exporter réponses</button>
          <button id="exportBtn" class="btn ghost admin-only">Exporter JSON</button>
          <label class="btn ghost admin-only" for="importFile">Importer JSON</label>
          <input id="importFile" type="file" accept="application/json" style="display:none" />
          <button id="clearAll" class="btn warn admin-only">Supprimer tout</button>
        </nav>
      </div>
    </header>

    <main class="container layout">
      <section class="left">
        <div class="panel">
          <h2>Créer / Modifier une question</h2>
          <form id="qaForm">
            <input type="hidden" id="q-id" />
            <label>Question
              <input id="q-title" type="text" placeholder="Titre de la question (ex: Qui a pull le pire boss ?)" required />
            </label>

            <label>Options (simple):
              <input id="q-choices" type="text" placeholder="Option1 | Option2 | Option3" />
            </label>

            <div style="margin-top:10px;border-top:1px dashed rgba(255,255,255,0.04);padding-top:10px">
              <div style="font-size:13px;color:var(--muted);margin-bottom:8px">Options avancées (texte + media)</div>
              <div id="optionsContainer"></div>
              <div style="margin-top:8px"><button type="button" id="addOptionBtn" class="btn ghost">Ajouter une option</button></div>
            </div>

            <!-- Le type media est détecté automatiquement à partir de l'URL ou du fichier -->

            <label>URL du media (facultatif)
              <input id="q-media-url" type="text" placeholder="https://... ou data:..." />
            </label>

            <label>Choisir une image depuis le dossier `img/` (facultatif)
              <select id="q-media-select">
                <option value="">-- Aucune --</option>
              </select>
            </label>

            <label>Ou importer un fichier (image / vidéo)
              <input id="q-media-file" type="file" accept="image/*,video/*" />
            </label>

            <div class="row">
              <div class="actions">
                <button type="submit" class="btn">Enregistrer</button>
                <button type="button" id="resetBtn" class="btn ghost">Réinitialiser</button>
              </div>
            </div>
          </form>
        </div>

        <div class="panel hint">
          <h4>Astuce</h4>
          <p>Les questions sont sauvegardées localement. Utilise l'export pour partager ou sauvegarder.</p>
        </div>
      </section>

      <section class="right">
        <div id="listPanel" class="panel">
          <h2>Liste des questions</h2>
          <input id="search" type="search" placeholder="Rechercher..." />
          <ul id="qaList" class="qa-list"></ul>
        </div>

        <!-- Preview visuelle supprimée côté public -->

        <div id="publicPanel" class="panel public-panel" style="display:none">
          <h2>Répondre aux questions</h2>
          <form id="publicForm">
            <label>Ton pseudo (optionnel)
              <input id="respondent" type="text" placeholder="Ex: Arthas" />
            </label>
            <div id="surveyQuestions"></div>
            <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
              <button type="submit" class="btn">Envoyer mes réponses</button>
              <button type="button" id="publicReset" class="btn ghost">Réinitialiser</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">© Guildou Awards — Prototype</div>
    </footer>

    <script src="app.js"></script>
    <script src="https://unpkg.com/three@0.154.0/build/three.min.js"></script>
    <script src="bg.js"></script>
    <script src="cursor.js"></script>
  </body>
</html>
