<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guildou Awards — Créateur de questions</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&family=Zen+Dots&display=swap" rel="stylesheet">
  </head>
  <body class="theme-void">
    <div id="bg"></div>
    <header class="site-header">
      <div class="container header-row">
        <div class="brand">
          <div class="logo"><img src="img/logo-contre-soiree.png" alt="Logo Guilde" /></div>
          <div>
            <h1>Guildou Awards</h1>
          </div>
        </div>
        <nav class="top-actions">
            <div class="mode-toggle" role="tablist" aria-label="Mode">
            <button id="modeAdmin" class="btn ghost active" role="tab" aria-selected="true">Admin</button>
            <button id="modePublic" class="btn ghost" role="tab">Formulaire</button>
          </div>
          <!-- admin controls removed per request -->
        </nav>
      </div>
    </header>

    <main class="container layout">
      <section class="left">
        <div class="panel">
          <h2>Créer / Modifier une question</h2>
          <form id="qaForm">
            <input type="hidden" id="q-id" />
            <label>Question
              <input id="q-title" type="text" placeholder="Titre de la question (ex: Qui a pull le pire boss ?)" required />
            </label>

            <label>Options (simple):
              <input id="q-choices" type="text" placeholder="Option1 | Option2 | Option3" />
            </label>

            <div style="margin-top:10px;border-top:1px dashed rgba(255,255,255,0.04);padding-top:10px">
              <div style="font-size:13px;color:var(--muted);margin-bottom:8px">Options avancées (texte + media)</div>
              <div id="optionsContainer"></div>
              <div style="margin-top:8px"><button type="button" id="addOptionBtn" class="btn ghost">Ajouter une option</button></div>
            </div>

            <!-- Le type media est détecté automatiquement à partir de l'URL ou du fichier -->

            <label>URL du media (facultatif)
              <input id="q-media-url" type="text" placeholder="https://... ou data:..." />
            </label>

            <label>Choisir une image depuis le dossier `img/` (facultatif)
              <div style="display:flex;gap:8px;align-items:center">
                <select id="q-media-select">
                  <option value="">-- Aucune --</option>
                </select>
                <button id="refreshImgListBtn" type="button" class="btn ghost">Actualiser</button>
              </div>
              <div id="imgListStatus" style="font-size:12px;color:var(--muted);margin-top:4px"></div>
            </label>

            <label>Ou importer un fichier (image / vidéo)
              <input id="q-media-file" type="file" accept="image/*,video/*" />
            </label>

            <div class="row">
              <div class="actions">
                <button type="submit" class="btn">Enregistrer</button>
                <button type="button" id="resetBtn" class="btn ghost">Réinitialiser</button>
              </div>
            </div>
          </form>
        </div>

        <div class="panel hint">
          <h4>Astuce</h4>
          <p>Les questions sont sauvegardées localement. Utilise l'export pour partager ou sauvegarder.</p>
        </div>

        
      </section>

      <section class="right">
        <div id="listPanel" class="panel">
          <h2>Liste des questions</h2>
          <input id="search" type="search" placeholder="Rechercher..." />
          <ul id="qaList" class="qa-list"></ul>
        </div>

        <!-- Preview visuelle supprimée côté public -->

        <div id="publicPanel" class="panel public-panel" style="display:none">
          <h2 class="panel-title">Guildou Awards</h2>
          <form id="publicForm">
            <div id="surveyQuestions"></div>

            <label class="respondent-field">Ton pseudo (obligatoire)
              <input id="respondent" name="respondent" type="text" placeholder="Ex: Arthas" required aria-required="true" />
            </label>

            <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
              <button type="submit" class="btn">Envoyer mes réponses</button>
            </div>
          </form>
        </div>
      </section>
      
    </main>

    <div id="resultsPanel" class="results-wrapper" style="display:none;margin-top:12px">
      <div class="container">
        <div class="panel results-panel">
          <div class="results-header">
            <h2>Résultats des sondages</h2>
            <div class="results-actions">
              <button id="resetResultsBtn" class="btn ghost">Réinitialiser résultats</button>
            </div>
          </div>
          <div id="participantsList" class="participants-list" style="margin-bottom:12px"></div>
          <div id="resultsContainer"></div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container">© Guildou Awards — Prototype</div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

    <script src="app.js"></script>
    <script src="https://unpkg.com/three@0.154.0/build/three.min.js"></script>
    <script src="bg.js"></script>
    <script src="cursor.js"></script>
    <!-- Site modal for styled alerts -->
    <div id="siteModal" class="site-modal" aria-hidden="true">
      <div class="site-modal-backdrop"></div>
      <div class="site-modal-panel" role="dialog" aria-modal="true" aria-labelledby="siteModalTitle">
        <h3 id="siteModalTitle" class="site-modal-title"></h3>
        <div id="siteModalBody" class="site-modal-body"></div>
        <div class="site-modal-actions"><button id="siteModalOk" class="btn">OK</button><button id="siteModalCancel" class="btn ghost">Annuler</button></div>
      </div>
    </div>
  </body>
</html>
